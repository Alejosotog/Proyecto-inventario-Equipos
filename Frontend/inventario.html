<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Inventario</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="header-bar">
    <h1 class="page-title">Inventario de Equipos</h1>
    <div class="user-menu">
        <span id="userEmail"></span>
        <div class="dropdown" id="dropdownMenu">
            <button onclick="cerrarSesion()">Cerrar sesión</button>
        </div>  
    </div>

</div>

<div class="nav-menu">
    <a href="inventario.html">Inicio</a>

    <div class="dropdown">
        <button class="dropbtn">Administración ▼</button>
        <div class="dropdown-content">
            <a href="categorias.html">Categorías</a>
            <a href="marcas.html">Marcas</a>
            <a href="proveedores.html">Proveedores</a>
        </div>
    </div>

    <a href="prestamos.html">Préstamos</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="usuarios.html">Usuarios / Responsables</a>
</div>


<div class="main-content">

    <div id="formContainer">

        <!-- hidden id field used when editing -->
        <input type="hidden" id="equipoId">

        <input type="text" id="nombreEquipo" placeholder="Nombre">
        <input type="text" id="serial" placeholder="Serial">
        <input type="text" id="modelo" placeholder="Modelo">
        <input type="text" id="propietario" placeholder="Propietario">
        <input type="text" id="magnitud" placeholder="Magnitud">
        <input type="text" id="rangoTrabajo" placeholder="Rango de Trabajo">
        <input type="text" id="rangoOperacion" placeholder="Rango de Operación">

        <select id="categoria">
            <option value="">Seleccione Categoría</option>
        </select>

        <select id="marca">
            <option value="">Seleccione Marca</option>
        </select>

        <select id="proveedor">
            <option value="">Seleccione Proveedor</option>
        </select>

        <button id="btnGuardar" onclick="agregarEquipo()">Guardar</button>
        <button type="button" onclick="limpiarFormulario()">Cancelar</button>

    </div>

    <div id="dataContainer">
        <table border="1">
            <thead>
            <tr>
                <th>Nombre</th>
                <th>Serial</th>
                <th>Modelo</th>
                <th>Propietario</th>
                <th>Magnitud</th>
                <th>Rango Trabajo</th>
                <th>Rango Operación</th>
                <th>Categoría</th>
                <th>Marca</th>
                <th>Proveedor</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody id="tablaEquipos"></tbody>
        </table>
    </div>

</div>

    <script src="js/script.js"></script>
    
    <div id="tooltipImg"></div>
</body>
</html>
