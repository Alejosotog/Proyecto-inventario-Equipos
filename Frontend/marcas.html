<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Marcas</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2>Inventario</h2>
        <a href="inventario.html">Inventario</a>
        <a href="categorias.html">Categorías</a>
        <a href="marcas.html" class="active">Marcas</a>
        <a href="proveedores.html">Proveedores</a>
    </aside>

    <!-- CONTENIDO -->
    <main class="main">

        <h1>Gestión de Marcas</h1>

        <!-- FORM -->
        <div class="card">
            <h2>Nueva Marca</h2>

            <div class="form-grid">
                <input type="text" id="nombre" placeholder="Nombre de la marca">
            </div>

            <button class="btn-primary" onclick="guardarMarca()">
                Guardar Marca
            </button>
        </div>

        <!-- TABLA -->
        <div class="card">
            <h2>Listado</h2>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                    </tr>
                </thead>
                <tbody id="tablaMarcas"></tbody>
            </table>

        </div>

    </main>

</div>

<script src="js/marcas.js"></script>
</body>
</html>
