<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="dashboard-page">

<div class="header-bar">
    <h1 class="page-title">📊 Dashboard Inventario</h1>

    <div class="user-menu">
        <span id="userEmail"></span>
        <div class="dropdown" id="dropdownMenu">
            <button onclick="cerrarSesion()">Cerrar sesión</button>
        </div>
    </div>
</div>

<div class="dashboard-container">
    <div class="filtros">
        <select id="filtroCategoria">
            <option value="">Todas las categorías</option>
        </select>

        <select id="filtroMarca">
            <option value="">Todas las marcas</option>
        </select>
    </div>

    <div class="cards">

        <div class="card kpi">
            <i class="fas fa-box icon"></i>
            <h3>Total Equipos</h3>
            <p id="totalEquipos"></p>
        </div>

        <div class="card kpi">
            <i class="fas fa-layer-group icon"></i>
            <h3>Categorías</h3>
            <p id="totalCategorias"></p>
        </div>

        <div class="card kpi">
            <i class="fas fa-tags icon"></i>
            <h3>Marcas</h3>
            <p id="totalMarcas"></p>
        </div>

        <div class="card kpi">
            <i class="fas fa-users icon"></i>
            <h3>Propietarios</h3>
            <p id="totalPropietarios"></p>
        </div>

    </div>

    <!-- GRÁFICOS -->
    <div class="grid-graficos">
        <canvas id="graficoCategoria"></canvas>
        <canvas id="graficoMarca"></canvas>
        <canvas id="graficoPropietario"></canvas>
        <canvas id="graficoMagnitud"></canvas>
    </div>

    <button onclick="exportarExcel()">Exportar a Excel</button>

</div>


<script src="js/dashboard.js"></script><script src="js/script.js"></script>
<script src="js/dashboard.js"></script>
</body>

</html>
