<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Préstamos</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="header-bar">
    <h1 class="page-title">Préstamos de Equipos</h1>
</div>

<div class="main-content">

    <div id="formContainer">
        <h3>Registrar Préstamo</h3>

        <select id="equipoPrestamo"></select>
        <select id="usuarioPrestamo"></select>

        <button onclick="registrarPrestamo()">Prestar</button>
    </div>

    <div id="dataContainer">
        <table border="1">
            <thead>
                <tr>
                    <th>Equipo</th>
                    <th>Usuario</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tablaPrestamos"></tbody>
        </table>
    </div>

</div>

<script src="js/script.js"></script>

</body>
</html>
